:1.7;margin:0 0 1rem}\n  .mathset .para .body p:last-child{margin-bottom:0}\n  .mathset .para .body ul{margin:.2rem 0 1rem 1.6rem;font-size:1.5rem;line-height:1.7}\n  .mathset .para .body li{margin:.5rem 0;padding-left:.3rem}\n  .subpart{display:flex;gap:.8rem;margin:1.6rem 0 0}\n  .subpart .let{flex:0 0 auto;font-weight:bold;font-size:1.5rem;line-height:1.7}\n  .subpart .subbody{flex:1;min-width:0}\n  .subpart .subbody p{margin:0}\n  .solline{display:flex;align-items:flex-end;gap:1rem;margin:1.3rem 0 .2rem}\n  .sollbl{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.14em;font-weight:bold;color:var(--muted)}\n  .solrule{flex:1;border-bottom:1.5px solid var(--line);height:2.4rem}\n\n  /* ---------- figures ---------- */\n  .figure{width:fit-content;max-width:100%;margin:.4rem auto 2.4rem;border:1px solid var(--line);border-radius:16px;background:#fff;padding:.7rem;cursor:zoom-in;transition:box-shadow .2s ease,transform .2s ease}\n  .figure:hover{box-shadow:0 10px 26px rgba(0,0,0,.12);transform:translateY(-2px)}\n  .figure img{display:block;width:auto;max-width:100%;height:auto;max-height:340px;border-radius:10px;background:#fff}\n  .figcap{font-family:'Courier New',monospace;font-size:12px;letter-spacing:.05em;color:var(--muted);margin-top:.7rem;text-align:center}\n\n  /* ---------- lightbox (pop-out card) ---------- */\n  .lightbox{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;background:rgba(22,20,15,.6);padding:2rem}\n  .lightbox.open{display:flex}\n  .lightcard{position:relative;background:#fff;border:1px solid var(--line);border-radius:18px;padding:1rem;max-width:min(940px,94vw);max-height:92vh;box-shadow:0 30px 80px rgba(0,0,0,.45);display:flex;flex-direction:column;transform:scale(.88);opacity:0;transition:transform .3s cubic-bezier(.2,.9,.3,1.25),opacity .25s ease}\n  .lightbox.open .lightcard{transform:scale(1);opacity:1}\n  .lightcard img{display:block;max-width:100%;max-height:78vh;object-fit:contain;border-radius:10px}\n  .lightcard figcaption{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.05em;color:var(--muted);text-align:center;margin-top:.9rem}\n  .lightclose{position:absolute;top:-16px;right:-16px;width:42px;height:42px;border-radius:50%;background:var(--ink);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.3)}\n\n  /* ---------- vocabulary popover ---------- */\n  .pop{position:absolute;z-index:90;max-width:400px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:1.2rem 1.4rem;box-shadow:0 14px 36px rgba(0,0,0,.18);font-family:Georgia,serif;font-size:1.3rem;line-height:1.5;display:none}\n  .pop .word{font-family:'Courier New',monospace;font-size:13px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.5rem;color:var(--term)}\n  .pop .x{float:right;cursor:pointer;color:var(--muted);font-family:sans-serif;margin-left:.6rem;font-size:1.2rem;line-height:1}\n\n  /* ---------- focus + motion polish ---------- */\n  .pacer-btn:focus-visible,.read-q:focus-visible,.pacedock button:focus-visible,.term:focus-visible,.pop .x:focus-visible,.psgnav button:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:8px}\n  .toggle button:focus-visible{outline:2px solid var(--accent);outline-offset:-3px}\n  h1,.read-q{text-wrap:balance}\n  .lede,.para .body{text-wrap:pretty}\n  @media (prefers-reduced-motion: reduce){\n    *{animation-duration:.001ms !important;transition-duration:.001ms !important}\n    html{scroll-behavior:auto !important}\n    .para{opacity:1 !important;transform:none !important}\n  }\n  @media(max-width:620px){\n    .para .body{font-size:1.5rem}\n    .num{width:38px;height:38px;font-size:14px}\n    .r-bar{padding:.7rem 1rem}\n    .psgname{min-width:108px}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body class=\"lang-en\">\n\n  \n\n  <div class=\"progress-track\"><div class=\"progress\" id=\"prog\"><\u002Fdiv><\u002Fdiv>\n\n  <!-- ===================== TOP BAR ===================== -->\n  <div class=\"r-bar\">\n    <div class=\"bar-left\">\n      <span class=\"kicker\"><span class=\"en\">Math · Raven's Song<\u002Fspan><span class=\"es\">Matemáticas · Raven<\u002Fspan><\u002Fspan>\n      <button class=\"losc-pill\" id=\"loscPill\" onclick=\"toggleLOSC()\" aria-expanded=\"false\">LOSC <span class=\"car\">▾<\u002Fspan><\u002Fbutton>\n      <div class=\"losc-pop\" id=\"loscPop\">\n        <div class=\"losc-sec\">\n          <div class=\"losc-h\"><span class=\"en\">Learning Objective<\u002Fspan><span class=\"es\">Objetivo de aprendizaje<\u002Fspan><\u002Fdiv>\n          <div class=\"losc-ed\"><span class=\"en\">SWBAT read “Raven’s Song” and use the story’s music details to add and subtract decimals, divide with fractions, and find the volume of a rectangular prism, correctly solving all 4 problems and showing their work.<\u002Fspan><span class=\"es\">Los estudiantes podrán leer “La canción de Raven” y usar los detalles musicales del cuento para sumar y restar decimales, dividir con fracciones y hallar el volumen de un prisma rectangular, resolviendo correctamente los 4 problemas y mostrando su trabajo.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"losc-sec\">\n          <div class=\"losc-h\"><span class=\"en\">Success Criteria<\u002Fspan><span class=\"es\">Criterios de logro<\u002Fspan><\u002Fdiv>\n          <div class=\"losc-ed\"><span class=\"en\">I am successful when I can: (1) restate one detail from “Raven’s Song” in my own words; (2) line up decimals or set up the fraction division correctly; (3) show every step of my work; and (4) label each final answer with correct units (Hz, notes, or in.).<\u002Fspan><span class=\"es\">Tengo éxito cuando puedo: (1) reformular un detalle de “La canción de Raven” con mis propias palabras; (2) alinear los decimales o plantear correctamente la división de fracciones; (3) mostrar cada paso de mi trabajo; y (4) etiquetar cada respuesta final con las unidades correctas (Hz, notas o pulg.).<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"bar-right\">\n      <div class=\"psgnav\" role=\"group\" aria-label=\"Passage selector\">\n        <button id=\"psgprev\" onclick=\"prevPassage()\" aria-label=\"Previous passage\">‹<\u002Fbutton>\n        <span class=\"psgname\" id=\"psgname\"><\u002Fspan>\n        <button id=\"psgnext\" onclick=\"nextPassage()\" aria-label=\"Next passage\">›<\u002Fbutton>\n      <\u002Fdiv>\n      <button id=\"pacertoggle\" class=\"pacer-btn off\" onclick=\"togglePacer()\">▸ <span class=\"en\">Reading Pacer<\u002Fspan><span class=\"es\">Marcapasos<\u002Fspan><\u002Fbutton>\n      <div class=\"toggle\" role=\"group\" aria-label=\"Language\">\n        <button id=\"btn-en\" class=\"on\" onclick=\"setLang('en')\">EN<\u002Fbutton>\n        <button id=\"btn-es\" onclick=\"setLang('es')\">ES<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wrap\">\n\n    <!-- ============================================================= -->\n    <!-- PASSAGE 1 — PHYSICAL EROSION                                   -->\n    <!-- ============================================================= -->\n    <section class=\"psg active\" data-id=\"raven\">\n      <div class=\"r-header\">\n        <div class=\"eyebrow\"><span class=\"en\">Literacy Connection · Science Fiction<\u002Fspan><span class=\"es\">Conexión literaria · Ciencia ficción<\u002Fspan><\u002Fdiv>\n        <h1>\n          <span class=\"en\">Raven’s <span class=\"hl\">Song<\u002Fspan><\u002Fspan>\n          <span class=\"es\">La canción de <span class=\"hl\">Raven<\u002Fspan><\u002Fspan>\n        <\u002Fh1>\n        <div class=\"lede\"><span class=\"en\">by Mista Ward<\u002Fspan><span class=\"es\">por Mista Ward<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"passage\">\n        <div class=\"para\">\n          <div class=\"num\">1<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Since she could remember, Raven had loved music.<\u002Fspan> <span class=\"s\">When she was just a child, her grandfather let her sit in the closet of their apartment and listen to old recordings using strange earpieces he called headphones.<\u002Fspan> <span class=\"s\">Eventually, the precious headphones had broken and her grandfather had passed away.<\u002Fspan> <span class=\"s\">Raven still kept the recordings in her closet, but without headphones, there was no way to play music without danger of a neighbor reporting her to the guards.<\u002Fspan> <span class=\"s\">The guards could arrest Raven and her parents for breaking the music ordinance, and those who were arrested rarely returned.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Desde que tenía memoria, a Raven le había encantado la música.<\u002Fspan> <span class=\"s\">Cuando era apenas una niña, su abuelo la dejaba sentarse en el armario de su apartamento y escuchar viejas grabaciones usando unos extraños auriculares que él llamaba audífonos.<\u002Fspan> <span class=\"s\">Con el tiempo, los preciados audífonos se habían roto y su abuelo había fallecido.<\u002Fspan> <span class=\"s\">Raven aún guardaba las grabaciones en su armario, pero sin audífonos, no había manera de poner música sin peligro de que un vecino la denunciara a los guardias.<\u002Fspan> <span class=\"s\">Los guardias podían arrestar a Raven y a sus padres por incumplir la ordenanza sobre la música, y los que eran arrestados rara vez regresaban.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">2<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Raven found it hard to believe that just over fifty years ago, music had been legal.<\u002Fspan> <span class=\"s\">She imagined the days when cars filled the street, sweet songs blaring from those things her grandfather called radios.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">A Raven le costaba creer que hacía poco más de cincuenta años la música había sido legal.<\u002Fspan> <span class=\"s\">Imaginaba los días en que los autos llenaban la calle, con dulces canciones sonando a todo volumen desde esas cosas que su abuelo llamaba radios.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">3<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Raven took the floating bus to school that day.<\u002Fspan> <span class=\"s\">In her notebook, she drew five lines with music notes on them.<\u002Fspan> <span class=\"s\">She’d learned to write music.<\u002Fspan> <span class=\"s\">She could hear the notes in her head.<\u002Fspan> <span class=\"s\">Suddenly, she caught herself humming a tune aloud.<\u002Fspan> <span class=\"s\">A boy next to her caught her wrist. “Quiet,” he said.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Ese día Raven tomó el autobús flotante hacia la escuela.<\u002Fspan> <span class=\"s\">En su cuaderno dibujó cinco líneas con notas musicales sobre ellas.<\u002Fspan> <span class=\"s\">Había aprendido a escribir música.<\u002Fspan> <span class=\"s\">Podía oír las notas en su cabeza.<\u002Fspan> <span class=\"s\">De repente, se sorprendió tarareando una melodía en voz alta.<\u002Fspan> <span class=\"s\">Un chico a su lado la agarró de la muñeca. “Silencio”, dijo.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">4<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">These days, even humming was dangerous.<\u002Fspan> <span class=\"s\">Sometimes Raven wondered if anyone else sang songs in their head all day.<\u002Fspan> <span class=\"s\">Sometimes she wondered if anyone remembered music at all, or if it had simply died along with the birds and trees and streams.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">En aquellos días, hasta tararear era peligroso.<\u002Fspan> <span class=\"s\">A veces Raven se preguntaba si alguien más cantaba canciones en su cabeza todo el día.<\u002Fspan> <span class=\"s\">A veces se preguntaba si alguien recordaba la música siquiera, o si simplemente había muerto junto con los pájaros, los árboles y los arroyos.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">5<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">Raven stepped onto a giant moving walkway that moved her briskly to her first class: genetics.<\u002Fspan> <span class=\"s\">There, they learned how to manipulate the cellular structure of food so that it could be grown quickly, indoors, in shallow ground.<\u002Fspan> <span class=\"s\">The class took place in an old auditorium.<\u002Fspan> <span class=\"s\">Instead of a teacher, a movie screen took center stage, flashing information for students to memorize.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Raven se subió a una gigantesca pasarela móvil que la llevó rápidamente a su primera clase: genética.<\u002Fspan> <span class=\"s\">Allí aprendían a manipular la estructura celular de los alimentos para que pudieran cultivarse rápidamente, en interiores, en suelo poco profundo.<\u002Fspan> <span class=\"s\">La clase tenía lugar en un viejo auditorio.<\u002Fspan> <span class=\"s\">En lugar de un maestro, una pantalla de cine ocupaba el centro del escenario, mostrando información para que los estudiantes la memorizaran.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">6<\u002Fdiv>\n          <div class=\"body\">\n            <span class=\"en\"><span class=\"s\">As Raven sat in the auditorium, she imagined what wonderful musical performances happened there long ago.<\u002Fspan> <span class=\"s\">She kept recording the notes of her song, holding her paper low so no one could see the markings.<\u002Fspan> <span class=\"s\">Lost in thought, Raven began to hum again.<\u002Fspan> <span class=\"s\">The other students turned to her with eyes wide as distant suns, but she didn’t stop humming the tune she had written.<\u002Fspan> <span class=\"s\">Soon, she heard another voice join in, then another, and another.<\u002Fspan> <span class=\"s\">For the first time in their lives, Raven and her peers felt the vibrations of music in the air.<\u002Fspan> <span class=\"s\">There was no turning back now.<\u002Fspan><\u002Fspan>\n            <span class=\"es\"><span class=\"s\">Mientras Raven estaba sentada en el auditorio, imaginaba las maravillosas presentaciones musicales que ocurrieron allí hace mucho tiempo.<\u002Fspan> <span class=\"s\">Siguió anotando las notas de su canción, sosteniendo su papel bajo para que nadie pudiera ver las marcas.<\u002Fspan> <span class=\"s\">Perdida en sus pensamientos, Raven comenzó a tararear de nuevo.<\u002Fspan> <span class=\"s\">Los demás estudiantes se volvieron hacia ella con los ojos tan abiertos como soles lejanos, pero ella no dejó de tararear la melodía que había escrito.<\u002Fspan> <span class=\"s\">Pronto, oyó que otra voz se le unía, luego otra, y otra.<\u002Fspan> <span class=\"s\">Por primera vez en su vida, Raven y sus compañeros sintieron las vibraciones de la música en el aire.<\u002Fspan> <span class=\"s\">Ya no había vuelta atrás.<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============================================================= -->\n    <!-- PASSAGE 2 — MATH LITERACY CONNECTION (display only)            -->\n    <!-- ============================================================= -->\n    <section class=\"psg\" data-id=\"math\">\n      <div class=\"r-header\">\n        <div class=\"eyebrow\"><span class=\"en\">Math Literacy Connection · Unit 2<\u002Fspan><span class=\"es\">Conexión matemática · Unidad 2<\u002Fspan><\u002Fdiv>\n        <h1>\n          <span class=\"en\">Raven’s <span class=\"hl\">Song<\u002Fspan><\u002Fspan>\n          <span class=\"es\">La canción de <span class=\"hl\">Raven<\u002Fspan><\u002Fspan>\n        <\u002Fh1>\n        <div class=\"lede\"><span class=\"en\">Base-Ten Operations, Division with Fractions, and Volume<\u002Fspan><span class=\"es\">Operaciones de base diez, división con fracciones y volumen<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"passage mathset\">\n        <p class=\"m-instr\"><span class=\"arw\">➤<\u002Fspan> <strong><span class=\"en\">Solve each problem. Show your work.<\u002Fspan><span class=\"es\">Resuelve cada problema. Muestra tu trabajo.<\u002Fspan><\u002Fstrong><\u002Fp>\n\n        <div class=\"para\">\n          <div class=\"num\">1<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">Connor is learning to sing. He learns that every note has a frequency. The frequency of a note is measured in hertz (Hz).<\u002Fspan><span class=\"es\">Connor está aprendiendo a cantar. Aprende que cada nota tiene una frecuencia. La frecuencia de una nota se mide en hercios (Hz).<\u002Fspan><\u002Fp>\n            <div class=\"subpart\">\n              <span class=\"let\">a.<\u002Fspan>\n              <div class=\"subbody\">\n                <p><span class=\"en\">The frequency of middle C is about 261.626 Hz. The frequency of the closest D is about 293.665 Hz. How much greater is the frequency of D than the frequency of middle C? Show your work.<\u002Fspan><span class=\"es\">La frecuencia del do central es de aproximadamente 261.626 Hz. La frecuencia del re más cercano es de aproximadamente 293.665 Hz. ¿Cuánto mayor es la frecuencia del re que la frecuencia del do central? Muestra tu trabajo.<\u002Fspan><\u002Fp>\n                <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"subpart\">\n              <span class=\"let\">b.<\u002Fspan>\n              <div class=\"subbody\">\n                <p><span class=\"en\">The note that is one octave higher than middle C has a frequency two times the frequency of middle C. What is the frequency of the note that is one octave higher than middle C? Show your work.<\u002Fspan><span class=\"es\">La nota que está una octava más alta que el do central tiene una frecuencia dos veces la frecuencia del do central. ¿Cuál es la frecuencia de la nota que está una octava más alta que el do central? Muestra tu trabajo.<\u002Fspan><\u002Fp>\n                <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">2<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">Connor sings an introduction to a piece of music that has four whole notes and one half note. He wants to know how many quarter notes will last the same length of time as this introduction. To find out, divide 4½ ÷ ¼. Show your work.<\u002Fspan><span class=\"es\">Connor canta una introducción a una pieza musical que tiene cuatro notas enteras y una nota de media. Quiere saber cuántas notas de cuarto durarán el mismo tiempo que esta introducción. Para averiguarlo, divide 4½ ÷ ¼. Muestra tu trabajo.<\u002Fspan><\u002Fp>\n            <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">3<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">It is far into the future, and music is banned. Nobody can access music online anymore, but Connor and his family have a collection of music CDs. They have a hidden storage unit for CDs that is 50 inches long and is filled with a stack of 128 CDs, each in a case. What is the approximate thickness of each CD case rounded to the nearest hundredth? Show your work.<\u002Fspan><span class=\"es\">Es un futuro lejano y la música está prohibida. Ya nadie puede acceder a la música en línea, pero Connor y su familia tienen una colección de CDs de música. Tienen una unidad de almacenamiento oculta para CDs que mide 50 pulgadas de largo y está llena con una pila de 128 CDs, cada uno en su estuche. ¿Cuál es el grosor aproximado de cada estuche de CD redondeado a la centésima más cercana? Muestra tu trabajo.<\u002Fspan><\u002Fp>\n            <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"para\">\n          <div class=\"num\">4<\u002Fdiv>\n          <div class=\"body\">\n            <p><span class=\"en\">Connor’s family has 197 more CDs (in addition to the 128 mentioned in problem 3). The CD cases are 5.59 inches wide and 4.92 inches long. Describe one way Connor can build a storage unit that holds the remaining 197 CDs. Sketch the dimensions of the storage unit and find its volume to the nearest hundredth.<\u002Fspan><span class=\"es\">La familia de Connor tiene 197 CDs más (además de los 128 mencionados en el problema 3). Los estuches de CD miden 5.59 pulgadas de ancho y 4.92 pulgadas de largo. Describe una manera en que Connor puede construir una unidad de almacenamiento que contenga los 197 CDs restantes. Dibuja las dimensiones de la unidad de almacenamiento y halla su volumen a la centésima más cercana.<\u002Fspan><\u002Fp>\n            <div class=\"solline\"><span class=\"sollbl\"><span class=\"en\">SOLUTION<\u002Fspan><span class=\"es\">SOLUCIÓN<\u002Fspan><\u002Fspan><span class=\"solrule\"><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv><!-- /wrap -->\n\n  <!-- ===================== PACER DOCK ===================== -->\n  <div class=\"pacedock\" aria-label=\"Reading pacer controls\">\n    <button id=\"pprev\" onclick=\"pacePrev()\" aria-label=\"Previous sentence\">‹<\u002Fbutton>\n    <span class=\"pcount\" id=\"pcount\">1 / 1<\u002Fspan>\n    <button id=\"pnext\" class=\"main\" onclick=\"paceNext()\" aria-label=\"Next sentence\">›<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ===================== VOCAB POPOVER ===================== -->\n  <div class=\"pop\" id=\"pop\"><\u002Fdiv>\n\n  <!-- ===================== IMAGE LIGHTBOX ===================== -->\n  <div class=\"lightbox\" id=\"lightbox\" onclick=\"if(event.target===this)closeLight()\">\n    <figure class=\"lightcard\">\n      <button class=\"lightclose\" onclick=\"closeLight()\" aria-label=\"Close\">✕<\u002Fbutton>\n      <img id=\"lightimg\" alt=\"\">\n      <figcaption id=\"lightcap\"><\u002Ffigcaption>\n    <\u002Ffigure>\n  <\u002Fdiv>\n\n<script>\n/* ===================== VOCABULARY GLOSSARY ===================== */\nvar GLOSS={};\n\n/* ===================== PASSAGES ===================== */\nvar PASSAGES=[\n  {en:'Reading: Raven',     es:'Lectura: Raven'},\n  {en:'Math Connection',    es:'Conexión matemática'}\n];\nvar ACTIVE=0;\n\n/* ===================== STATE ===================== */\nvar lang='en';\nvar pacerOn=false;\nvar idx=0;\nvar sentences=[];\n\n/* ===================== PASSAGE SWITCHING ===================== */\nfunction updatePsgName(){\n  var p=PASSAGES[ACTIVE];\n  document.getElementById('psgname').innerHTML=\n    '<span class=\"en\">'+p.en+'<\u002Fspan><span class=\"es\">'+p.es+'<\u002Fspan>'+\n    '<span class=\"pos\">'+(ACTIVE+1)+' / '+PASSAGES.length+'<\u002Fspan>';\n  document.getElementById('psgprev').disabled = ACTIVE===0;\n  document.getElementById('psgnext').disabled = ACTIVE===PASSAGES.length-1;\n}\nfunction setPassage(i){\n  if(i<0||i>=PASSAGES.length) return;\n  ACTIVE=i;\n  var secs=document.querySelectorAll('.psg');\n  for(var k=0;k<secs.length;k++){ secs[k].classList.toggle('active',k===i); }\n  document.querySelectorAll('.psg.active .para').forEach(function(el){el.classList.add('show');});\n  hidePop();\n  updatePsgName();\n  syncPacerAvailability();\n  window.scrollTo({top:0,behavior:'auto'});\n  if(pacerOn){ rebuildSentences(); idx=0; applyPace(); }\n  else { document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');}); }\n}\n\n/* hide the Reading Pacer on passages that have no prose to pace (e.g. Math Connection) */\nfunction activeHasSentences(){\n  return document.querySelectorAll('.psg.active .para .body > .en > .s, .psg.active .para .body > .es > .s').length>0;\n}\nfunction syncPacerAvailability(){\n  var btn=document.getElementById('pacertoggle');\n  if(!btn) return;\n  if(activeHasSentences()){\n    btn.style.display='';\n  }else{\n    if(pacerOn) togglePacer();   // turn it off before hiding\n    btn.style.display='none';\n  }\n}\nfunction nextPassage(){ setPassage(ACTIVE+1); }\nfunction prevPassage(){ setPassage(ACTIVE-1); }\n\n/* ===================== LANGUAGE ===================== */\nfunction setLang(l){\n  lang=l;\n  document.body.classList.toggle('lang-es',l==='es');\n  document.body.classList.toggle('lang-en',l!=='es');\n  document.getElementById('btn-en').classList.toggle('on',l==='en');\n  document.getElementById('btn-es').classList.toggle('on',l==='es');\n  updatePsgName();\n  updateLightCaption();\n  hidePop();\n  if(pacerOn){ rebuildSentences(); idx=Math.min(idx,sentences.length-1); applyPace(); }\n}\n\n/* ===================== READING PACER ===================== */\nfunction rebuildSentences(){\n  var langSel = lang==='es' ? '.es' : '.en';\n  sentences = Array.prototype.slice.call(document.querySelectorAll('.psg.active .para .body '+langSel+' > .s'));\n  document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');});\n}\n\nfunction togglePacer(){\n  pacerOn=!pacerOn;\n  document.body.classList.toggle('pacer',pacerOn);\n  var tb=document.getElementById('pacertoggle');\n  if(pacerOn){\n    tb.classList.remove('off');\n    tb.innerHTML='■ <span class=\"en\">Pacer: ON<\u002Fspan><span class=\"es\">Marcapasos: SÍ<\u002Fspan>';\n    document.querySelectorAll('.psg.active .para').forEach(function(el){el.classList.add('show');});\n    rebuildSentences(); idx=0; applyPace();\n  }else{\n    tb.classList.add('off');\n    tb.innerHTML='▸ <span class=\"en\">Reading Pacer<\u002Fspan><span class=\"es\">Marcapasos<\u002Fspan>';\n    document.querySelectorAll('.s').forEach(function(s){s.classList.remove('active','done');});\n  }\n}\n\nfunction applyPace(){\n  sentences.forEach(function(s,i){\n    s.classList.remove('active','done');\n    if(i<idx) s.classList.add('done');\n    if(i===idx) s.classList.add('active');\n  });\n  var cur=sentences[idx];\n  if(cur){\n    var r=cur.getBoundingClientRect();\n    var mid=window.innerHeight*0.42;\n    window.scrollBy({top:r.top-mid,behavior:'smooth'});\n  }\n  document.getElementById('pcount').textContent=(idx+1)+' / '+sentences.length;\n  document.getElementById('pprev').style.opacity = idx===0 ? '.35' : '1';\n  document.getElementById('pnext').style.opacity = idx>=sentences.length-1 ? '.35' : '1';\n}\nfunction paceNext(){ if(idx<sentences.length-1){idx++;applyPace();} }\nfunction pacePrev(){ if(idx>0){idx--;applyPace();} }\n\ndocument.addEventListener('keydown',function(e){\n  if(!pacerOn)return;\n  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();paceNext();}\n  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();pacePrev();}\n});\n\n/* ===================== REVEAL ON SCROLL ===================== */\nvar io=new IntersectionObserver(function(es){\n  es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('show'); io.unobserve(e.target);} });\n},{threshold:.18});\ndocument.querySelectorAll('.psg.active .para').forEach(function(el){io.observe(el);});\n\n/* ===================== PROGRESS BAR ===================== */\nwindow.addEventListener('scroll',function(){\n  var h=document.documentElement;\n  var pct=(h.scrollTop)/(h.scrollHeight-h.clientHeight)*100;\n  document.getElementById('prog').style.width=Math.min(100,pct)+'%';\n});\n\n/* ===================== VOCAB POPOVER ===================== */\nvar pop=document.getElementById('pop');\nfunction hidePop(){pop.style.display='none';}\nfunction showPop(el){\n  var key=el.getAttribute('data-k'); var g=GLOSS[key]; if(!g)return;\n  var d=g[lang];\n  pop.innerHTML='<span class=\"x\" onclick=\"hidePop()\">✕<\u002Fspan><div class=\"word\">'+d.w+'<\u002Fdiv>'+d.d;\n  pop.style.display='block';\n  var r=el.getBoundingClientRect();\n  var pw=pop.offsetWidth, ph=pop.offsetHeight;\n  var left=Math.min(window.innerWidth-pw-14, Math.max(14, r.left));\n  var top=r.bottom+10; if(top+ph>window.innerHeight){top=r.top-ph-10;}\n  pop.style.left=(left+window.scrollX)+'px'; pop.style.top=(top+window.scrollY)+'px';\n}\ndocument.addEventListener('click',function(e){\n  var t=e.target.closest('.term');\n  if(t){e.stopPropagation();showPop(t);}\n  else if(!e.target.closest('.pop')){hidePop();}\n});\ndocument.addEventListener('keydown',function(e){\n  if((e.key==='Enter'||e.key===' ')&&document.activeElement&&document.activeElement.classList.contains('term')){\n    e.preventDefault();showPop(document.activeElement);\n  }\n});\nwindow.addEventListener('scroll',hidePop);\n\n/* ===================== IMAGE LIGHTBOX ===================== */\nfunction openLight(fig){\n  var img=fig.querySelector('img'); if(!img)return;\n  var lb=document.getElementById('lightbox');\n  document.getElementById('lightimg').src=img.getAttribute('src');\n  document.getElementById('lightimg').alt=img.getAttribute('alt')||'';\n  lb.dataset.capEn=img.getAttribute('data-cap-en')||'';\n  lb.dataset.capEs=img.getAttribute('data-cap-es')||'';\n  updateLightCaption();\n  lb.classList.add('open');\n}\nfunction updateLightCaption(){\n  var lb=document.getElementById('lightbox');\n  document.getElementById('lightcap').textContent = lang==='es' ? (lb.dataset.capEs||'') : (lb.dataset.capEn||'');\n}\nfunction closeLight(){ document.getElementById('lightbox').classList.remove('open'); }\ndocument.addEventListener('keydown',function(e){\n  if(e.key==='Escape') closeLight();\n  if((e.key==='Enter'||e.key===' ')&&document.activeElement&&document.activeElement.classList.contains('figure')){\n    e.preventDefault();openLight(document.activeElement);\n  }\n});\n\n/* ===================== INIT ===================== */\nupdatePsgName();\nsyncPacerAvailability();\n<\u002Fscript>\n<script>\n(function(){\n  window.toggleLOSC=function(){\n    var p=document.getElementById('loscPop'),b=document.getElementById('loscPill');\n    if(!p)return; var o=p.classList.toggle('open'); if(b){b.classList.toggle('open',o);b.setAttribute('aria-expanded',o);}\n  };\n  document.addEventListener('click',function(e){\n    var p=document.getElementById('loscPop'); if(!p||!p.classList.contains('open'))return;\n    if(!p.contains(e.target)&&!e.target.closest('.losc-pill')){p.classList.remove('open');var b=document.getElementById('loscPill');if(b){b.classList.remove('open');b.setAttribute('aria-expanded','false');}}\n  });\n  document.querySelectorAll('.losc-ed[id]').forEach(function(el){\n    try{var v=localStorage.getItem(el.id); if(v!=null) el.innerHTML=v;}catch(e){}\n    el.addEventListener('input',function(){try{localStorage.setItem(el.id,el.innerHTML);}catch(e){}});\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
